<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./assets/style.css" />

    <title>Frontend Mentor | Age calculator app</title>
    <script src="./assets/script.js" defer></script>
  </head>

  <body>
    <main>
      <form>
        <fieldset class="form-fields">
          <legend class="sr-only">Enter your birth date</legend>
          <div class="field">
            <label for="day">Day</label>
            <input
              id="day"
              name="day"
              type="number"
              placeholder="DD"
              aria-describedby="error-day"
            />
            <p class="error-message" id="error-day" role="alert"></p>
          </div>
          <div class="field">
            <label for="month">Month</label>
            <input
              id="month"
              name="month"
              type="number"
              placeholder="MM"
              aria-describedby="error-month"
            />
            <p class="error-message" id="error-month" role="alert"></p>
          </div>
          <div class="field">
            <label for="year">Year</label>
            <input
              id="year"
              name="year"
              type="number"
              placeholder="YYYY"
              aria-describedby="error-year"
            />
            <p class="error-message" id="error-year" role="alert"></p>
          </div>
        </fieldset>
        <div class="divider">
          <hr />
          <button type="submit" class="submit-button">
            <img src="./assets/images/icon-arrow.svg" alt="Submit form" />
          </button>
        </div>
      </form>
      <section id="results" role="status">
        <h2 class="sr-only">Your age</h2>
        <output id="years" for="day month year">--</output> years <br />
        <output id="months" for="day month year">--</output> months <br />
        <output id="days" for="day month year">--</output> days
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Anne-Cécile</a>.
    </footer>
  </body>
</html>
